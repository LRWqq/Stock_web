<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票成交記錄行動看板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-3 text-slate-800 antialiased font-sans">

    <div class="max-w-md mx-auto">
        <header class="text-center my-5 space-y-1">
            <h1 class="text-2xl font-black tracking-tight text-slate-900 flex items-center justify-center gap-2">
                static 📊 股票成交行動看板
            </h1>
            <p id="statusLabel" class="text-xs text-slate-400 font-medium font-mono">正在連線雲端抽屜載入數據...</p>
        </header>
        
        <div class="sticky top-2 z-50 mb-4 shadow-sm">
            <input type="text" id="searchInput" placeholder="快速篩選股號 / 股票名稱..." 
                   class="w-full px-4 py-3 bg-white/90 backdrop-blur-md border border-slate-200 rounded-xl font-medium focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all placeholder:text-slate-400">
        </div>

        <div id="cardsContainer" class="space-y-4 pb-10"></div>
    </div>

    <script>
        // 🌟 【超級重要】：請把下面這串網址，改成你的 Gist 官方 API 網址！
        // 格式如: https://api.github.com/gists/你的一長串GistID
        const GIST_API_URL = "https://api.github.com/gists/e16a4bc73f32cd2760003699d308d2ae"; 

        let allTrades = [];
        const activeCharts = {}; // 存放 ApexCharts 實例

        // ── 1. 從雲端 Gist 讀取最新資料 ──
        async function loadData() {
            try {
                const cacheBuster = "?t=" + new Date().getTime(); 
                document.getElementById('statusLabel').innerText = "正在向 GitHub 索取最新資料...";
                
                const res = await fetch(GIST_API_URL + cacheBuster);
                if (!res.ok) throw new Error("GitHub 回應失敗，代碼: " + res.status);
                
                const gistData = await res.json();
                const rawContent = gistData.files["data.json"].content;
                allTrades = JSON.parse(rawContent);
                
                renderCards();
                
                // 啟動監聽器（Lazy Loading）
                window.addEventListener('scroll', handleLazyLoad);
                window.addEventListener('resize', handleLazyLoad);
                
            } catch (err) {
                document.getElementById('statusLabel').innerText = "❌ 錯誤原因: " + err.message;
                document.getElementById('statusLabel').className = "text-xs text-rose-500 font-bold bg-rose-50 p-2 rounded-lg mt-2";
                console.error(err);
            }
        }

        // ── 2. 在手機內部即時生成股票卡片結構 ──
        function renderCards(filterKeyword = "") {
            const container = document.getElementById('cardsContainer');
            container.innerHTML = ""; 

            if (allTrades.length === 0) return;

            // 分組資料
            const groups = {};
            allTrades.forEach(row => {
                const id = row["股號"];
                if (!groups[id]) groups[id] = [];
                groups[id].push(row);
            });

            let stockCount = 0;
            let totalRows = 0;

            for (const stockId in groups) {
                const group = groups[stockId];
                const stockName = group[0]["股票名稱"] || "個股";

                // 關鍵字過濾
                if (filterKeyword && !stockId.includes(filterKeyword) && !stockName.includes(filterKeyword)) {
                    continue;
                }

                stockCount++;
                totalRows += group.length;

                const buyCount = group.filter(r => String(r["類別"]).includes("買")).length;
                const sellCount = group.filter(r => String(r["類別"]).includes("賣")).length;
                const savedNote = localStorage.getItem(`note_${stockId}`) || "";
                const hasEnoughData = group.length >= 3;

                // 建立卡片節點
                const card = document.createElement('div');
                card.id = `card_box_${stockId}`;
                card.dataset.stockId = stockId;
                card.dataset.rendered = "false"; 
                card.className = "bg-white border border-slate-100 rounded-2xl shadow-sm overflow-hidden p-4 space-y-3 transition-all duration-300";

                let html = `
                    <div class="flex justify-between items-center border-b border-slate-100 pb-2.5">
                        <div class="flex items-baseline gap-1.5">
                            <span class="font-extrabold text-slate-900 text-lg tracking-tight">${stockId}</span>
                            <span class="text-sm font-bold text-slate-500">${stockName}</span>
                        </div>
                        <div class="flex items-center gap-2">
                            ${hasEnoughData ? `
                                <button onclick="toggleChartMode('${stockId}')" id="btn_${stockId}" 
                                    class="text-[10px] font-bold bg-blue-50 text-blue-600 border border-blue-100 px-2 py-1 rounded-lg hover:bg-blue-100 active:scale-95 transition-all">
                                    ⇄ 專業 K 線
                                </button>
                            ` : ''}
                            <span class="text-[10px] font-semibold bg-slate-100 text-slate-400 px-2 py-1 rounded-md font-mono">共 ${group.length} 筆</span>
                        </div>
                    </div>
                    
                    <div class="space-y-1 max-h-32 overflow-y-auto no-scrollbar">
                `;

                const recent = group.slice(-3).reverse(); 
                recent.forEach(row => {
                    const isBuy = String(row["類別"]).includes("買");
                    const badgeClass = isBuy ? "bg-blue-50/60 text-blue-700 border-blue-100" : "bg-rose-50/70 text-rose-700 border-rose-100";
                    html += `
                        <div class="${badgeClass} border text-[11px] px-2.5 py-1.5 rounded-lg flex justify-between items-center font-mono font-medium">
                            <span>📅 ${row["日期"]}</span>
                            <span class="font-bold">${row["類別"]}</span>
                            <span>${row["股數"]} 股</span>
                            <span class="font-bold">$${parseFloat(row["單價"]).toFixed(1)}</span>
                        </div>
                    `;
                });

                html += `
                    </div>
                    
                    <div class="relative w-full min-h-[160px] bg-slate-50 rounded-xl border border-slate-100 overflow-hidden">
                        <div id="my_chart_wrapper_${stockId}" class="w-full h-full">
                            <div id="chart_${stockId}" class="w-full"></div>
                        </div>
                        <div id="tv_chart_wrapper_${stockId}" class="absolute inset-0 w-full h-full hidden flex items-center justify-center">
                            </div>
                    </div>
                    
                    <div class="border-t border-slate-100 pt-3 space-y-1.5">
                        <label class="block text-[11px] font-bold text-slate-400 tracking-wider">📝 我的基本面與估值筆記：</label>
                        <div class="flex gap-2">
                            <textarea id="textarea_${stockId}" placeholder="白天在外操作備忘：例如合理本益比、預計承接價位..." 
                                class="flex-1 text-xs p-2.5 border border-slate-200 rounded-xl bg-slate-50/50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all resize-none h-12 no-scrollbar font-medium text-slate-700">${savedNote}</textarea>
                            <button onclick="saveNote('${stockId}')" 
                                class="bg-slate-900 hover:bg-slate-800 text-white text-xs px-3.5 font-bold rounded-xl transition shadow-sm active:scale-95 flex items-center">儲存</button>
                        </div>
                    </div>
                `;

                card.innerHTML = html;
                container.appendChild(card);
            }

            document.getElementById('statusLabel').innerText = `Sync: 共 ${stockCount} 支個股，${totalRows} 筆歷史成交`;
            handleLazyLoad();
        }

        // ── 3. 🎯 防禦型懶載入（Lazy Load）：滑動到螢幕內才開始初始化圖表 ──
        function handleLazyLoad() {
            const cards = document.querySelectorAll('[id^="card_box_"]');
            cards.forEach(card => {
                if (card.dataset.rendered === "true") return; 

                const rect = card.getBoundingClientRect();
                if (rect.top < window.innerHeight && rect.bottom >= 0) {
                    card.dataset.rendered = "true"; 
                    const stockId = card.dataset.stockId;
                    const group = allTrades.filter(r => r["股號"] === stockId);
                    
                    if (group.length >= 3) {
                        // 🟢 狀況 A：大於等於 3 筆，預設渲染並顯示「自有的買賣歷史線」
                        renderChart(stockId, group);
                    } else {
                        // 🟡 狀況 B：少於 3 筆，不用留白！直接強制開啟「TradingView 專業K線模式」
                        forceTradingViewMode(stockId);
                    }
                }
            });
        }

        // ── 4. 網頁端買賣雙線高效繪圖引擎（鎖死不縮放） ──
        function renderChart(stockId, group) {
            const sorted = [...group].sort((a,b) => a["日期"].localeCompare(b["日期"]));
            const buyData = [];
            const sellData = [];

            sorted.forEach(row => {
                const price = parseFloat(row["單價"]);
                if (String(row["類別"]).includes("買")) {
                    buyData.push({ x: row["日期"], y: price });
                } else {
                    sellData.push({ x: row["日期"], y: price });
                }
            });

            const options = {
                chart: { 
                    type: 'line', 
                    height: 150, 
                    toolbar: { show: false }, 
                    animations: { enabled: false }, // 關閉動畫，滑動時更順暢
                    zoom: { enabled: false },
                    scroller: { enabled: false },
                    sparkline: { enabled: false }
                },
                touchAction: 'pan-y', 
                colors: ['#3b82f6', '#ef4444'],
                series: [
                    { name: '買入', data: buyData },
                    { name: '賣出', data: sellData }
                ],
                stroke: { width: 2, curve: 'straight' },
                markers: { size: 4, strokeWidth: 1 },
                xaxis: { labels: { show: false }, axisBorder: { show: false }, axisTicks: { show: false } },
                yaxis: { labels: { style: { colors: '#94a3b8', fontSize: '9px', fontFamily: 'monospace' } } },
                grid: { borderColor: '#f8fafc' },
                legend: { show: false },
                tooltip: { theme: 'light', x: { show: true }, shared: true, intersect: false }
            };

            const chart = new ApexCharts(document.querySelector(`#chart_${stockId}`), options);
            chart.render();
            activeCharts[stockId] = chart;
        }

        // ── 5. 🚀 核心黑科技：雙模式切換功能 ──
        function toggleChartMode(stockId) {
            const myWrapper = document.getElementById(`my_chart_wrapper_${stockId}`);
            const tvWrapper = document.getElementById(`tv_chart_wrapper_${stockId}`);
            const btn = document.getElementById(`btn_${stockId}`);

            if (tvWrapper.classList.contains('hidden')) {
                // 🔄 切換到「TradingView 專業K線」
                myWrapper.classList.add('hidden');
                tvWrapper.classList.remove('hidden');
                btn.innerText = "⇄ 買賣紀錄";
                btn.className = "text-[10px] font-bold bg-amber-50 text-amber-600 border border-amber-100 px-2 py-1 rounded-lg hover:bg-amber-100 active:scale-95 transition-all";
                
                // 如果是第一次切換，才動態載入 iframe，省電省流量
                if (tvWrapper.innerHTML.trim() === "") {
                    injectTradingViewIframe(stockId, tvWrapper);
                }
            } else {
                // 🔄 切回「自己的買賣紀錄線」
                tvWrapper.classList.add('hidden');
                myWrapper.classList.remove('hidden');
                btn.innerText = "⇄ 專業 K 線";
                btn.className = "text-[10px] font-bold bg-blue-50 text-blue-600 border border-blue-100 px-2 py-1 rounded-lg hover:bg-blue-100 active:scale-95 transition-all";
            }
        }

        // ── 6. 強制少於 3 筆的個股直接進入 TradingView 模式 ──
        function forceTradingViewMode(stockId) {
            const myWrapper = document.getElementById(`my_chart_wrapper_${stockId}`);
            const tvWrapper = document.getElementById(`tv_chart_wrapper_${stockId}`);
            myWrapper.classList.add('hidden');
            tvWrapper.classList.remove('hidden');
            injectTradingViewIframe(stockId, tvWrapper);
        }

        // ── 7. 注入 TradingView 官方免費的高級行動端 K 線圖組件 ──
        function injectTradingViewIframe(stockId, containerElement) {
            
            // 💡 移除原本生硬的 TWSE: 前綴
            // 改用 TradingView 的官方標準 embed 網址與最安全的參數組合
            const tvUrl = `https://s.tradingview.com/widgetembed/?frameElementId=tradingview_chart&symbol=${stockId}&interval=D&theme=light&style=1&timezone=Asia%2FTaipei&studies=%5B%5D&showpopupbutton=false&showheaderwidget=false&backcolor=f8fafc&withdateranges=false`;
            
            // 如果上述無前綴在某些極端狀況下不靈，以下是台灣上市櫃的自動分流保險：
            // 台灣上市通常是 4 碼，而上櫃也是 4 碼，但我們可以利用 TradingView 萬能搜尋格式。
            // 這裡直接將網址寫入 iframe，並利用 class 確保圓角漂亮
            containerElement.innerHTML = `
                <iframe src="${tvUrl}" 
                        width="100%" height="160" frameborder="0" allowtransparency="true" scrolling="no" class="rounded-xl"></iframe>
            `;
        }

        // ── 8. 儲存註記到手機 LocalStorage ──
        function saveNote(stockId) {
            const textarea = document.getElementById(`textarea_${stockId}`);
            const noteText = textarea.value.trim();
            localStorage.setItem(`note_${stockId}`, noteText);
            alert(`✨ [${stockId}] 估值備忘註記儲存成功！`);
        }

        // ── 9. 搜尋框篩選 ──
        document.getElementById('searchInput').addEventListener('input', (e) => {
            renderCards(e.target.value.trim());
        });

        loadData();
    </script>
</body>
</html>
